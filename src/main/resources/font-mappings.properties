# 字体映射配置文件
# Font Mapping Configuration
#
# 格式说明：
# 1. 字体映射：font.字体名=字体文件路径
#    例如：font.楷体=/usr/share/fonts/truetype/arphic/ukai.ttc
#
# 2. 别名映射：alias.别名=真实字体名
#    例如：alias.AR PL UKai CN=楷体
#
# 配置加载顺序（后加载的会覆盖先加载的）：
# - 默认内置映射（智能映射）
# - classpath:font-mappings.properties (JAR 包内)
# - ~/.loongoffice/font-mappings.properties (用户目录)
# - /etc/loongoffice/font-mappings.properties (系统目录，仅 Linux)
#
# 注意：
# - 默认的字体映射已由智能映射自动处理，会优先使用系统中存在的字体
# - 此配置文件主要用于用户自定义特殊字体映射或别名
# - 建议只使用 alias.* 配置，让智能映射自动选择最佳字体

# ============================================================
# 字体别名映射
# ============================================================

# Linux 字体别名 -> Windows 字体名
alias.AR PL UKai CN=楷体
alias.Noto Serif CJK SC=宋体
alias.Noto Sans CJK SC=黑体

# Windows 字体名 -> Linux 字体名（双向映射）
alias.楷体=AR PL UKai CN
alias.宋体=Noto Serif CJK SC
alias.黑体=Noto Sans CJK SC
alias.等线=Noto Sans CJK SC
alias.微软雅黑=Noto Sans CJK SC
alias.仿宋=AR PL UKai CN
