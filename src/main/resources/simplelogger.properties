# SLF4J Simple Logger Configuration
# See: http://www.slf4j.org/api/org/slf4j/impl/SimpleLogger.html

# =============================================================================
# Log Levels
# =============================================================================
# Default log level for all instances of SimpleLogger.
# Must be one of ("trace", "debug", "info", "warn", "error" or "off").
# If not specified, defaults to "info".
# Use -P debug profile to enable DEBUG logging: mvn clean package -DskipTests -P debug
org.slf4j.simpleLogger.defaultLogLevel=${log.level:-info}

# Log level for the OFDImportFilter class
# Change to "debug" for detailed conversion logs
# Change to "warn" or "error" for production use (less output)
org.slf4j.simpleLogger.log.org.ofdrw.uno.OFDImportFilter=info

# =============================================================================
# Output Format
# =============================================================================
# Set to true if you want the current date and time to be included in output messages.
# Default is false
org.slf4j.simpleLogger.showDateTime=true

# The date and time format to be used in the output messages.
# The pattern describing the date and time format is defined by SimpleDateFormat.
# If the format is not specified or is invalid, the number of milliseconds since start up will be output.
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS

# Set to true if you want to output the current thread name.
# Defaults to true.
org.slf4j.simpleLogger.showThreadName=true

# Set to true if you want the Logger instance name to be included in output messages.
# Defaults to true.
org.slf4j.simpleLogger.showLogName=true

# Set to true if you want the last component of the name to be included in output messages.
# Defaults to false.
org.slf4j.simpleLogger.showShortLogName=false

# Should the level string be output in brackets?
# Defaults to false.
org.slf4j.simpleLogger.levelInBrackets=true

# =============================================================================
# Output Target
# =============================================================================
# The output target which can be the path to a file, or the special values "System.out" and "System.err".
# Default is "System.err".
# Using System.out so logs appear in LibreOffice console/terminal
org.slf4j.simpleLogger.logFile=System.out

# If the output target is set to "System.out" or "System.err" (see preceding entry),
# by default, logs will be output to the latest value referenced by System.out/err variables.
# By setting this parameter to true, the output stream will be cached, i.e. assigned once at initialization time and re-used independently of the current value referenced by System.out/err.
# Default is false.
org.slf4j.simpleLogger.cacheOutputStream=false

# =============================================================================
# Notes
# =============================================================================
# - Logs are also written to: /tmp/ofd-import-filter.log (file-based logging)
# - Console output format: [timestamp] [thread] [level] logger - message
# - Example: 2026-02-11 20:02:30.123 [main] [INFO] org.ofdrw.uno.OFDImportFilter - Starting OFD import
